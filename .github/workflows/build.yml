name: Build Ayesha AI Ultimate V2
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
      - name: Create App with Mic Support
        run: |
          rm -rf android
          # یہاں ہم نے جاوا (java) کو فکس کر دیا ہے
          flutter create . --platforms android --org com.raza.ayesha -a java
          
          # پرمیشنز شامل کرنا
          sed -i '/<application/i \    <uses-permission android:name="android.permission.INTERNET"/>\n    <uses-permission android:name="android.permission.RECORD_AUDIO"/>\n    <uses-permission android:name="android.permission.MODIFY_AUDIO_SETTINGS"/>' android/app/src/main/AndroidManifest.xml

          # جاوا کوڈ میں مائیک کا راستہ کھولنا
          cat <<EOF > android/app/src/main/java/com/raza/ayesha/MainActivity.java
          package com.raza.ayesha;
          import io.flutter.embedding.android.FlutterActivity;
          import android.webkit.PermissionRequest;
          import android.webkit.WebChromeClient;
          import android.webkit.WebView;

          public class MainActivity extends FlutterActivity {
              @Override
              public void onFlutterUiDisplayed() {
                  super.onFlutterUiDisplayed();
                  WebView webView = (WebView) getWindow().getDecorView().findViewById(android.R.id.content);
                  if(webView != null) {
                      webView.setWebChromeClient(new WebChromeClient() {
                          @Override
                          public void onPermissionRequest(final PermissionRequest request) {
                              request.grant(request.getResources());
                          }
                      });
                  }
              }
          }
          EOF

      - name: Build APK
        run: |
          flutter pub get
          flutter build apk --release
      - uses: actions/upload-artifact@v4
        with:
          name: ayesha-final-apk
          path: build/app/outputs/flutter-apk/app-release.apk
          
