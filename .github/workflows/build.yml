name: Build Ayesha AI APK
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      # یہ جاوا سیٹ اپ ایپ کو بلڈ ہونے میں مدد دے گا
      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'
          
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          
      - name: Generate Android Files Automatically
        run: flutter create . --platforms android --org com.raza.ayesha
        
      - name: Install Dependencies
        run: flutter pub get
        
      - name: Build APK
        run: flutter build apk --release
        
      - name: Upload APK
        uses: actions/upload-artifact@v3
        with:
          name: ayesha-final-apk
          path: build/app/outputs/flutter-apk/app-release.apk
          
