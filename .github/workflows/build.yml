name: Build Ayesha AI APK
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
          
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          
      - name: Generate and Configure Android with Internet Permission
        run: |
          rm -rf android
          flutter create . --platforms android --org com.raza.ayesha
          
          # یہ جادوئی لائن اینڈرائڈ کو انٹرنیٹ استعمال کرنے کی اجازت دے گی
          sed -i '/<application/i \    <uses-permission android:name="android.permission.INTERNET"/>' android/app/src/main/AndroidManifest.xml
        
      - name: Install Dependencies
        run: flutter pub get
        
      - name: Build APK
        run: flutter build apk --release
        
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ayesha-final-apk
          path: build/app/outputs/flutter-apk/app-release.apk
          
